name: Lab 05 - Notification Compose Readiness Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Notification Docker Compose Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env from example
        run: cp .env.example .env

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Lint docker-compose.yml
        run: docker compose config --quiet

      - name: Build and start Compose stack
        run: docker compose up -d --build --wait

      - name: Show running containers
        run: docker compose ps

      - name: Test API /health
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS http://localhost:8000/health && exit 0
            echo "Retry $i..."; sleep 5
          done
          docker compose logs api
          exit 1

      - name: Test sender worker /health
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS http://localhost:9000/health && exit 0
            echo "Retry $i..."; sleep 5
          done
          docker compose logs sender-worker
          exit 1

      - name: Test DB readiness
        run: |
          set -a; source .env; set +a
          docker compose exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"

      - name: Run Newman collection
        run: |
          mkdir -p reports
          npm run test:compose

      - name: Verify readiness checklist
        run: |
          CHECKLIST="checklists/readiness-checklist.md"
          TOTAL=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[ xX]\]' "$CHECKLIST" || true)
          CHECKED=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[xX]\]' "$CHECKLIST" || true)
          echo "Readiness checklist: ${CHECKED:-0}/${TOTAL:-0} items checked"
          if [ "${CHECKED:-0}" -lt 6 ]; then
            echo "::error::Lab requires at least 6 readiness items"
            exit 1
          fi

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab05-notification-newman-reports
          path: reports/
          if-no-files-found: warn

      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
