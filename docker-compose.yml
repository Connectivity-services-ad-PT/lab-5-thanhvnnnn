services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-notification-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      sender-worker:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sender-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fit4110-notification-worker-lab05
    environment:
      SERVICE_NAME: notification-sender-worker
      SERVICE_VERSION: "1.0.0"
    networks:
      - team-internal
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: fit4110-notification-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-notificationdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05} -d ${POSTGRES_DB:-notificationdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  team-internal:
    driver: bridge
  class-net:
    driver: bridge

volumes:
  db-data:
